services:
  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_prod_data:/qdrant/storage
    ports:
      - "6333:6333"
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - qdrant
    env_file: .env
    environment:
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - hf_cache:/app/hf_cache
    restart: unless-stopped

volumes:
  qdrant_prod_data:
  hf_cache:
